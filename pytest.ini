[pytest]
minversion = 7.0

testpaths =
    api-testing/test_case
    ui-testing/tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --strict-markers --tb=short

markers =
    smoke: smoke test
    regression: regression test
    login: login feature
    cart: cart feature
    checkout: checkout feature

log_cli = true
log_cli_level = INFO

filterwarnings =
    ignore::DeprecationWarning