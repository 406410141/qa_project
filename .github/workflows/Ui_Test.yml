name: Run UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 2 * * *'

jobs:
  ui-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirement.txt

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run UI tests with Allure
        run: |
          pytest ui-testing/tests/ -v --alluredir=ui-testing/allure-results

      - name: Install Allure commandline
        run: |
          npm install -g allure-commandline

      - name: Generate Allure Report
        run: |
          allure generate ./ui-testing/allure-results -o ./ui-testing/allure-report --clean

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-report
          path: ui-testing/allure-report

      - name: Upload Allure Results (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: ui-testing/allure-results
